<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Korkmazlar Yurt — Yönetim Sistemi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Site'den alınan renkler */
  --primary:       #043132;
  --primary-600:   #032828;
  --primary-100:   #b3d3d3;
  --primary-50:    #e6f0f0;
  --primary-text:  #ffffff;

  --bg:            #f8fafc;
  --bg-card:       #ffffff;
  --txt:           #1e293b;
  --txt-muted:     #64748b;
  --txt-light:     #94a3b8;
  --border:        #e2e8f0;
  --border-focus:  #043132;

  --green:         #16a34a;
  --green-bg:      #dcfce7;
  --green-text:    #15803d;
  --amber:         #d97706;
  --amber-bg:      #fef3c7;
  --amber-text:    #b45309;
  --red:           #dc2626;
  --red-bg:        #fee2e2;
  --red-text:      #b91c1c;
  --blue:          #2563eb;
  --blue-bg:       #dbeafe;
  --blue-text:     #1d4ed8;
  --gray-bg:       #f1f5f9;
  --gray-text:     #475569;

  --radius:        6px;
  --radius-md:     8px;
  --radius-lg:     12px;
  --shadow-sm:     0 1px 2px 0 rgba(0,0,0,0.05);
  --shadow:        0 1px 3px 0 rgba(0,0,0,0.10), 0 1px 2px -1px rgba(0,0,0,0.10);
  --shadow-md:     0 4px 6px -1px rgba(0,0,0,0.10), 0 2px 4px -2px rgba(0,0,0,0.10);
}

html, body {
  height: 100%;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--txt);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ══════════════════════════════════════
   SCREENS
══════════════════════════════════════ */
.screen { display: none; flex-direction: column; min-height: 100vh; }
.screen.active { display: flex; }

/* ══════════════════════════════════════
   LOGIN
══════════════════════════════════════ */
#loginScreen {
  align-items: center;
  justify-content: center;
  background: var(--bg);
  padding: 2rem 1rem;
  gap: 0;
}

.login-box {
  width: 100%;
  max-width: 400px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-md);
  overflow: hidden;
}
.login-top {
  background: var(--primary);
  padding: 32px 32px 28px;
  text-align: center;
}
.login-logo-circle {
  width: 56px; height: 56px;
  background: rgba(255,255,255,0.15);
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 14px;
  border: 1.5px solid rgba(255,255,255,0.25);
}
.login-logo-circle span { color: #fff; font-size: 22px; font-weight: 700; letter-spacing: -1px; }
.login-top h1 { color: #fff; font-size: 18px; font-weight: 600; }
.login-top p  { color: rgba(255,255,255,0.6); font-size: 12px; margin-top: 4px; }

.login-body { padding: 24px 28px 28px; }

.role-tabs {
  display: grid; grid-template-columns: repeat(3,1fr);
  gap: 0; border: 1px solid var(--border); border-radius: var(--radius-md); overflow: hidden;
  margin-bottom: 20px;
}
.role-tab {
  padding: 9px 6px; font-size: 13px; font-weight: 500; cursor: pointer;
  background: var(--bg); color: var(--txt-muted); border: none;
  transition: all 0.15s; text-align: center;
}
.role-tab:not(:last-child) { border-right: 1px solid var(--border); }
.role-tab.active { background: var(--primary); color: #fff; }

.form-field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
.form-field label { font-size: 12px; font-weight: 500; color: var(--txt-muted); }
.form-field input {
  padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius-md);
  font-size: 14px; color: var(--txt); background: var(--bg-card);
  outline: none; transition: border-color 0.15s;
  font-family: inherit;
}
.form-field input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(4,49,50,0.08); }

.btn-login {
  width: 100%; padding: 10px; background: var(--primary); color: #fff;
  border: none; border-radius: var(--radius-md); font-size: 14px; font-weight: 600;
  cursor: pointer; transition: background 0.15s; font-family: inherit; margin-top: 4px;
}
.btn-login:hover { background: var(--primary-600); }

.login-demo {
  text-align: center; font-size: 12px; color: var(--txt-light);
  margin-top: 14px; line-height: 1.8;
}
.login-demo b { color: var(--txt-muted); font-weight: 600; }

/* ══════════════════════════════════════
   TOP NAV (site'deki gibi)
══════════════════════════════════════ */
#mainApp { flex-direction: column; }

.topnav {
  height: 64px;
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px;
  position: sticky; top: 0; z-index: 50;
  box-shadow: var(--shadow-sm);
  flex-shrink: 0;
}
.topnav-brand { display: flex; align-items: center; gap: 10px; }
.topnav-logo {
  width: 36px; height: 36px;
  background: var(--primary); border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 14px; color: #fff; letter-spacing: -0.5px;
}
.topnav-title { font-size: 15px; font-weight: 600; color: var(--txt); }
.topnav-title span { font-weight: 400; color: var(--txt-muted); font-size: 13px; margin-left: 4px; }

.topnav-tabs { display: flex; align-items: center; gap: 2px; }
.topnav-tab {
  padding: 6px 14px; border-radius: var(--radius-md);
  font-size: 13px; font-weight: 500; cursor: pointer;
  border: none; background: transparent; color: var(--txt-muted);
  transition: all 0.15s; font-family: inherit;
}
.topnav-tab:hover { background: var(--bg); color: var(--txt); }
.topnav-tab.active { background: var(--primary); color: #fff; }

.topnav-right { display: flex; align-items: center; gap: 10px; }
.topnav-user {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 12px 6px 8px;
  border: 1px solid var(--border); border-radius: var(--radius-md);
  background: var(--bg); cursor: pointer; font-size: 13px;
}
.topnav-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--primary); color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600; flex-shrink: 0;
}
.topnav-uname { font-weight: 500; color: var(--txt); }
.topnav-urole { font-size: 11px; color: var(--txt-muted); }

.btn-logout-top {
  padding: 6px 14px; border: 1px solid var(--border); border-radius: var(--radius-md);
  background: var(--bg-card); color: var(--txt-muted); font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all 0.15s; font-family: inherit;
}
.btn-logout-top:hover { background: var(--red-bg); color: var(--red-text); border-color: var(--red); }

/* ══════════════════════════════════════
   PAGE LAYOUT
══════════════════════════════════════ */
.page-content {
  flex: 1;
  max-width: 1100px;
  width: 100%;
  margin: 0 auto;
  padding: 24px 24px;
}

.page-header {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 20px;
}
.page-header-left h2 { font-size: 20px; font-weight: 700; color: var(--txt); }
.page-header-left p  { font-size: 13px; color: var(--txt-muted); margin-top: 3px; }
.page-header-right   { display: flex; gap: 8px; align-items: center; }

/* ══════════════════════════════════════
   CARDS
══════════════════════════════════════ */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
}
.card-body { padding: 20px; }
.card-title { font-size: 14px; font-weight: 600; color: var(--txt); margin-bottom: 14px; }

/* STAT CARDS */
.stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 20px; }
.stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px 18px; box-shadow: var(--shadow-sm); }
.stat-label { font-size: 12px; font-weight: 500; color: var(--txt-muted); margin-bottom: 6px; }
.stat-value { font-size: 28px; font-weight: 700; line-height: 1; }
.stat-sub   { font-size: 12px; color: var(--txt-muted); margin-top: 5px; }
.stat-card.green .stat-value { color: var(--green); }
.stat-card.amber .stat-value { color: var(--amber); }
.stat-card.blue  .stat-value { color: var(--blue); }
.stat-card.red   .stat-value { color: var(--red); }

/* TWO COL */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 16px; }

/* ══════════════════════════════════════
   BUTTONS
══════════════════════════════════════ */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; border-radius: var(--radius-md);
  font-size: 13px; font-weight: 500; cursor: pointer;
  border: 1px solid transparent; transition: all 0.15s; font-family: inherit;
}
.btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
.btn-primary:hover { background: var(--primary-600); }
.btn-secondary { background: var(--bg-card); color: var(--txt); border-color: var(--border); }
.btn-secondary:hover { background: var(--bg); }
.btn-danger { background: var(--red-bg); color: var(--red-text); border-color: #fecaca; }
.btn-sm { padding: 5px 12px; font-size: 12px; }
.btn-xs { padding: 3px 9px; font-size: 11px; }

/* ══════════════════════════════════════
   BADGES
══════════════════════════════════════ */
.badge {
  display: inline-flex; align-items: center;
  padding: 2px 8px; border-radius: 20px;
  font-size: 11px; font-weight: 500; white-space: nowrap;
}
.badge-green { background: var(--green-bg); color: var(--green-text); }
.badge-amber { background: var(--amber-bg); color: var(--amber-text); }
.badge-red   { background: var(--red-bg);   color: var(--red-text); }
.badge-blue  { background: var(--blue-bg);  color: var(--blue-text); }
.badge-gray  { background: var(--gray-bg);  color: var(--gray-text); }
.badge-primary { background: var(--primary-50); color: var(--primary); }

/* ══════════════════════════════════════
   TABLES
══════════════════════════════════════ */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
thead th {
  text-align: left; padding: 10px 14px;
  font-size: 11px; font-weight: 600; color: var(--txt-muted);
  border-bottom: 1px solid var(--border);
  background: var(--bg); text-transform: uppercase; letter-spacing: 0.04em;
}
tbody td { padding: 11px 14px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: var(--bg); }
.td-name { font-weight: 600; color: var(--txt); }
.td-muted { color: var(--txt-muted); font-size: 12px; }

/* ══════════════════════════════════════
   ODA PLANI
══════════════════════════════════════ */
.floor-tabs {
  display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 18px;
  padding: 4px; background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius-md); width: fit-content;
}
.floor-tab {
  padding: 6px 14px; border-radius: var(--radius); border: none;
  font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit;
  background: transparent; color: var(--txt-muted); transition: all 0.15s;
}
.floor-tab:hover { background: var(--bg-card); color: var(--txt); }
.floor-tab.active { background: var(--primary); color: #fff; box-shadow: var(--shadow-sm); }

.legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
.leg-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--txt-muted); }
.leg-dot { width: 12px; height: 12px; border-radius: 3px; border: 1px solid transparent; }

.kat-section { margin-bottom: 20px; }
.kat-header {
  font-size: 12px; font-weight: 600; color: var(--txt-muted);
  padding: 6px 10px; margin-bottom: 8px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius-md); display: inline-block;
  border-left: 3px solid var(--primary);
  text-transform: uppercase; letter-spacing: 0.04em;
}
.oda-grid { display: flex; flex-wrap: wrap; gap: 7px; }
.oda-cell {
  width: 58px; height: 50px;
  border-radius: var(--radius-md); border: 1.5px solid;
  cursor: pointer; font-size: 11px; font-weight: 600;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
  transition: transform 0.12s, box-shadow 0.12s;
}
.oda-cell:hover { transform: scale(1.06); box-shadow: var(--shadow); }
.oda-cell.bos   { background: #fff;          border-color: var(--border); color: var(--txt-muted); }
.oda-cell.dolu  { background: var(--green-bg); border-color: #86efac; color: var(--green-text); }
.oda-cell.kism  { background: var(--amber-bg); border-color: #fcd34d; color: var(--amber-text); }
.oda-cell.tam   { background: var(--red-bg);   border-color: #fca5a5; color: var(--red-text); }
.oda-cell.bakim { background: var(--blue-bg);  border-color: #93c5fd; color: var(--blue-text); }
.oda-no   { font-size: 11px; font-weight: 700; }
.oda-tip  { font-size: 9px; opacity: 0.75; font-weight: 500; }

/* ══════════════════════════════════════
   FORM ELEMENTS
══════════════════════════════════════ */
.form-row   { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 0; }
.form-label { font-size: 12px; font-weight: 500; color: var(--txt-muted); }
.form-control {
  padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius-md);
  font-size: 13px; color: var(--txt); background: var(--bg-card);
  outline: none; transition: border-color 0.15s; font-family: inherit; width: 100%;
}
.form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(4,49,50,0.08); }
textarea.form-control { resize: vertical; min-height: 80px; }

/* ══════════════════════════════════════
   ARIZA CARDS
══════════════════════════════════════ */
.ariza-item {
  display: flex; gap: 14px; align-items: flex-start;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
}
.ariza-item:last-child { border-bottom: none; }
.ariza-icon {
  width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 16px;
}
.ariza-icon.urgent { background: var(--red-bg); }
.ariza-icon.normal { background: var(--amber-bg); }
.ariza-icon.done   { background: var(--green-bg); }
.ariza-title { font-size: 13px; font-weight: 600; }
.ariza-meta  { font-size: 12px; color: var(--txt-muted); margin-top: 3px; }
.ariza-badges{ display: flex; gap: 6px; margin-top: 7px; flex-wrap: wrap; }

/* ══════════════════════════════════════
   DUYURU
══════════════════════════════════════ */
.duyuru-item {
  border-left: 3px solid var(--primary); padding: 12px 16px;
  background: var(--primary-50); border-radius: 0 var(--radius-md) var(--radius-md) 0;
  margin-bottom: 10px;
}
.duyuru-title { font-size: 13px; font-weight: 600; }
.duyuru-date  { font-size: 11px; color: var(--txt-muted); margin-top: 2px; }
.duyuru-body  { font-size: 12px; color: var(--txt-muted); margin-top: 7px; line-height: 1.6; }

/* ══════════════════════════════════════
   HERO (öğrenci/personel)
══════════════════════════════════════ */
.hero-card {
  background: var(--primary); color: #fff;
  border-radius: var(--radius-lg); padding: 22px 24px; margin-bottom: 20px;
  display: flex; align-items: center; justify-content: space-between;
}
.hero-card h3  { font-size: 18px; font-weight: 700; }
.hero-card p   { font-size: 13px; opacity: 0.65; margin-top: 4px; }
.hero-badge {
  background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2);
  border-radius: var(--radius-md); padding: 8px 16px; font-size: 13px;
}

/* ══════════════════════════════════════
   INFO TABLE (oda bilgisi vb)
══════════════════════════════════════ */
.info-table { width: 100%; border-collapse: collapse; }
.info-table td { padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.info-table tr:last-child td { border-bottom: none; }
.info-table .ik { color: var(--txt-muted); font-size: 12px; width: 45%; }
.info-table .iv { font-weight: 600; }

/* ══════════════════════════════════════
   MODAL
══════════════════════════════════════ */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(15,23,42,0.4);
  backdrop-filter: blur(3px);
  display: none; align-items: center; justify-content: center;
  z-index: 1000;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: var(--bg-card); border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  width: 420px; max-width: calc(100vw - 32px);
  max-height: 90vh; overflow-y: auto;
}
.modal-header {
  padding: 18px 22px 0;
  display: flex; align-items: center; justify-content: space-between;
}
.modal-header h3 { font-size: 16px; font-weight: 700; }
.modal-close {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--bg); border: 1px solid var(--border);
  cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center;
  color: var(--txt-muted); line-height: 1;
}
.modal-close:hover { background: var(--red-bg); color: var(--red-text); border-color: #fecaca; }
.modal-body { padding: 16px 22px; display: flex; flex-direction: column; gap: 12px; }
.modal-footer { padding: 0 22px 20px; display: flex; gap: 8px; justify-content: flex-end; }

/* ══════════════════════════════════════
   PROGRESS BAR
══════════════════════════════════════ */
.progress-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.progress-label { font-size: 12px; color: var(--txt-muted); width: 80px; flex-shrink: 0; }
.progress-bar { flex: 1; height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; border: 1px solid var(--border); }
.progress-fill { height: 100%; border-radius: 3px; background: var(--primary); transition: width 0.5s ease; }
.progress-pct { font-size: 12px; font-weight: 600; min-width: 36px; text-align: right; color: var(--txt); }

/* ══════════════════════════════════════
   DONUT (CSS-only pie)
══════════════════════════════════════ */
.donut-wrap { display: flex; align-items: center; gap: 20px; }
.donut { width: 80px; height: 80px; border-radius: 50%; flex-shrink: 0; }
.donut-legend { display: flex; flex-direction: column; gap: 6px; }
.donut-leg-item { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--txt-muted); }
.donut-leg-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

/* ══════════════════════════════════════
   BELGE
══════════════════════════════════════ */
.belge-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; border-bottom: 1px solid var(--border);
}
.belge-item:last-child { border-bottom: none; }
.belge-name { font-size: 13px; font-weight: 600; }
.belge-date { font-size: 11px; color: var(--txt-muted); margin-top: 2px; }

/* ══════════════════════════════════════
   EMPTY STATE
══════════════════════════════════════ */
.empty-state { text-align: center; padding: 48px 24px; color: var(--txt-muted); font-size: 13px; }
.empty-state .empty-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.4; }

/* ══════════════════════════════════════
   NOTICE
══════════════════════════════════════ */
.notice {
  padding: 12px 16px; border-radius: var(--radius-md);
  background: var(--primary-50); border: 1px solid var(--primary-100);
  color: var(--primary); font-size: 13px; line-height: 1.6;
}

/* ══════════════════════════════════════
   ACTION BAR (tablo üstü)
══════════════════════════════════════ */
.action-bar { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid var(--border); }
.action-bar-title { font-size: 14px; font-weight: 600; }
</style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div id="loginScreen" class="screen active">
  <div class="login-box">
    <div class="login-top">
      <div class="login-logo-circle"><span>KY</span></div>
      <h1>Korkmazlar Yurt</h1>
      <p>Yönetim Paneli — 2025/2026</p>
    </div>
    <div class="login-body">
      <div class="role-tabs">
        <button class="role-tab active" onclick="setRole('ogrenci')">👩 Öğrenci</button>
        <button class="role-tab" onclick="setRole('personel')">👥 Personel</button>

    <div class="stat-card"><div class="stat-label">Boş Oda</div><div class="stat-value" style="color:var(--txt)">${bosC}</div><div class="stat-sub">oda</div></div>
    <div class="stat-card green"><div class="stat-label">Kısmi Dolu</div><div class="stat-value">${kismC}</div><div class="stat-sub">oda</div></div>
    <div class="stat-card red"><div class="stat-label">Tam Dolu</div><div class="stat-value">${tamC}</div><div class="stat-sub">oda</div></div>

        <div class="leg-item"><div class="leg-dot" style="background:#fff;border-color:var(--border)"></div>Boş</div>

        <div class="leg-item"><div class="leg-dot" style="background:var(--red-bg);border-color:#fca5a5"></div>Tam Dolu</div>
        <div class="leg-item"><div class="leg-dot" style="background:var(--blue-bg);border-color:#93c5fd"></div>Bakımda</div>
      </div>
      <div id="floorOdalar">
        ${renderKatOdalar(KATS[activeFloorIdx])}

    </div>
  </div>`;
}
function renderKatOdalar(kat){
  return`<div class="kat-section">
    <div class="kat-header">${kat.ad} — ${kat.odalar.length} oda</div>
    <div class="oda-grid">
      ${kat.odalar.map(o=>{
        const d=odaDurum[o];
        const cls=d==='bos'?'bos':d==='tam'?'tam':d==='kism'?'kism':'bakim';
        return`<button class="oda-cell ${cls}" onclick="openOdaDetay('${o}')">
          <span class="oda-no">${o}</span>
          <span class="oda-tip">${odaTip(o)}K</span>
        </button>`;
      }).join('')}
    </div>
  </div>`;
}
function switchFloor(idx){
  activeFloorIdx=idx;
  document.querySelectorAll('.floor-tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  document.getElementById('floorOdalar').innerHTML=renderKatOdalar(KATS[idx]);
}
function openOdaDetay(oda){
  const d=odaDurum[oda], tip=odaTip(oda);

        <button class="btn btn-secondary btn-sm" onclick="navigate('duyurularGor')">Tümü →</button>
      </div>
      ${duyurular.slice(0,3).map(d=>`
      <div class="ariza-item" style="gap:10px">
        <div style="flex:1">
          <div class="ariza-title">${d.baslik}</div>
          <div class="ariza-meta">📅 ${d.tarih}</div>
        </div>
      </div>`).join('')}
    </div>
  </div>`;
}

// ─────────────────────────────────────────
// ARIZA BİLDİR
// ─────────────────────────────────────────
function arizaBildir(b){
  setHeader('Arıza Bildir','Oda veya tesis arızası bildirin');
  const odaArizalar=arizalar.filter(a=>a.oda==='101');
  b.innerHTML=`
  <div class="grid-2">
    <div class="card card-body">
      <div class="card-title">🔧 Yeni Arıza Bildirimi</div>
      <div style="display:flex;flex-direction:column;gap:12px">
        <div class="form-group"><label class="form-label">Oda No</label><input class="form-control" value="101" readonly style="background:var(--bg)"></div>
        <div class="form-group"><label class="form-label">Öncelik</label>
          <select class="form-control" id="ar_onc"><option>Düşük</option><option>Orta</option><option>Yüksek</option></select>
        </div>
        <div class="form-group"><label class="form-label">Konu</label><input class="form-control" id="ar_konu" placeholder="Kısa başlık..."></div>
        <div class="form-group"><label class="form-label">Açıklama</label><textarea class="form-control" id="ar_acik" placeholder="Detaylı açıklayın..."></textarea></div>
        <button class="btn btn-primary" onclick="kaydetAriza()">Arıza Bildir</button>
      </div>
    </div>
    <div class="card">
      <div class="action-bar"><div class="action-bar-title">📋 Önceki Bildirimlerim</div></div>
      ${odaArizalar.length?odaArizalar.map(a=>`
      <div class="ariza-item">
        <div class="ariza-icon ${a.durum==='Tamamlandı'?'done':'normal'}">🔧</div>
        <div style="flex:1"><div class="ariza-title">${a.konu}</div><div class="ariza-meta">${a.tarih} · ${a.aciklama}</div></div>
        <span class="badge ${a.durum==='Tamamlandı'?'badge-green':a.durum==='İşlemde'?'badge-blue':'badge-amber'}">${a.durum}</span>
      </div>`).join(''):'<div class="empty-state" style="padding:24px"><div class="empty-icon">🔧</div>Henüz bildirim yok.</div>'}
    </div>
  </div>`;
}
function kaydetAriza(){
  const konu=document.getElementById('ar_konu').value.trim();
  if(!konu){alert('Konu gerekli!');return;}
  arizalar.unshift({id:Date.now(),oda:'101',konu,aciklama:document.getElementById('ar_acik').value,tarih:new Date().toISOString().split('T')[0],durum:'Bekliyor',oncelik:document.getElementById('ar_onc').value});
  alert('Arıza bildiriminiz alındı!');arizaBildir(document.getElementById('pageBody'));
}

// ─────────────────────────────────────────
// BELGE TALEP
// ─────────────────────────────────────────
function belgeTalep(b){
  setHeader('Belge Talep Formu','Resmi belgelerinizi buradan talep edin');
  b.innerHTML=`
  <div style="max-width:480px">
    <div class="card card-body">
      <div class="card-title">📄 Belge Talep Et</div>
      <div style="display:flex;flex-direction:column;gap:12px">
        <div class="form-group"><label class="form-label">Belge Tipi</label>
          <select class="form-control" id="bl_tip">
            <option>Öğrenci Belgesi</option>
            <option>İkametgah Belgesi</option>
            <option>Katkı Belgesi</option>
            <option>Diğer</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">Açıklama (isteğe bağlı)</label>
          <textarea class="form-control" id="bl_acik" placeholder="Belgeyi ne amaçla kullanacaksınız?"></textarea>
        </div>
        <button class="btn btn-primary" onclick="belgeTalepGonder()">Talep Gönder</button>
      </div>
    </div>
    <div class="notice" style="margin-top:12px">
      📋 Belgeleriniz genellikle <strong>1–3 iş günü</strong> içinde hazırlanır. Hazır olduğunda bilgilendirileceksiniz.
    </div>
  </div>`;
}
function belgeTalepGonder(){alert(`"${document.getElementById('bl_tip').value}" talebiniz alındı! 1-3 iş günü içinde hazırlanacaktır.`);}

// ─────────────────────────────────────────
// DUYURULAR (öğrenci/personel görünümü)
// ─────────────────────────────────────────
function duyurularGor(b){
  setHeader('Duyurular','Güncel yurt duyuruları');
  b.innerHTML=duyurular.map(d=>`
    <div class="duyuru-item" style="margin-bottom:10px">
      <div class="duyuru-title">${d.baslik}</div>
      <div class="duyuru-date">📅 ${d.tarih}</div>
      <div class="duyuru-body">${d.icerik}</div>
    </div>`).join('')||'<div class="empty-state">Duyuru bulunmuyor.</div>';
}

// ─────────────────────────────────────────
// MODAL
// ─────────────────────────────────────────
function openModal(html){
  document.getElementById('modalBox').innerHTML=html;
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}
function modalOutsideClick(e){if(e.target===document.getElementById('modalOverlay'))closeModal();}
</script>
</body>
</html>
