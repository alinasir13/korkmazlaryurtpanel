<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Korkmazlar Yurt — Yönetim Sistemi v3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --p:#043132;--p6:#032828;--p1:#b3d3d3;--p5:#e6f0f0;
  --bg:#f8fafc;--card:#fff;--txt:#1e293b;--muted:#64748b;--light:#94a3b8;
  --border:#e2e8f0;--radius:6px;--radius-md:8px;--radius-lg:12px;
  --shadow-sm:0 1px 2px rgba(0,0,0,.05);
  --shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px -1px rgba(0,0,0,.1);
  --shadow-md:0 4px 6px -1px rgba(0,0,0,.1),0 2px 4px -2px rgba(0,0,0,.1);
  --green:#16a34a;--gbg:#dcfce7;--gtxt:#15803d;
  --amber:#d97706;--abg:#fef3c7;--atxt:#b45309;
  --red:#dc2626;--rbg:#fee2e2;--rtxt:#b91c1c;
  --blue:#2563eb;--bbg:#dbeafe;--btxt:#1d4ed8;
  --purple:#7c3aed;--pbg:#ede9fe;--ptxt:#5b21b6;
}
html,body{height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
.screen{display:none;min-height:100vh}
.screen.active{display:flex;flex-direction:column}

/* ── LOGIN ─────────────────── */
#loginScreen{align-items:center;justify-content:center;background:var(--bg);padding:2rem 1rem}
.login-box{width:100%;max-width:420px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-md);overflow:hidden}
.login-top{background:var(--p);padding:28px 28px 24px;text-align:center}
.login-logo{width:52px;height:52px;background:rgba(255,255,255,.15);border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;border:1.5px solid rgba(255,255,255,.25);font-size:20px;font-weight:700;color:#fff;letter-spacing:-1px}
.login-top h1{color:#fff;font-size:17px;font-weight:600}
.login-top p{color:rgba(255,255,255,.6);font-size:12px;margin-top:3px}
.login-body{padding:20px 24px 24px}
.login-section-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;margin-top:4px}
.role-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:16px}
.role-card{padding:8px 4px;border:1.5px solid var(--border);border-radius:var(--radius-md);cursor:pointer;text-align:center;font-size:11px;font-weight:500;color:var(--muted);background:var(--bg);transition:all .15s}
.role-card:hover{border-color:var(--p1);color:var(--p)}
.role-card.active{border-color:var(--p);background:var(--p5);color:var(--p);font-weight:600}
.role-card .rc-icon{font-size:18px;display:block;margin-bottom:4px}
.role-card .rc-sub{font-size:9px;color:var(--light);margin-top:2px}
.form-field{margin-bottom:12px}
.form-field label{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-bottom:4px}
.form-field input,.form-field select{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-md);font-size:13px;color:var(--txt);background:var(--card);outline:none;font-family:inherit;transition:border-color .15s}
.form-field input:focus,.form-field select:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(4,49,50,.08)}
.btn-login{width:100%;padding:10px;background:var(--p);color:#fff;border:none;border-radius:var(--radius-md);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .15s}
.btn-login:hover{opacity:.9}
.login-demo{font-size:11px;color:var(--light);text-align:center;margin-top:14px;line-height:1.8;padding:10px;background:var(--bg);border-radius:var(--radius-md)}
.login-demo b{color:var(--muted)}

/* ── TOP NAV ─────────────────── */
#mainApp{flex-direction:column}
.topnav{height:60px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:50;box-shadow:var(--shadow-sm);flex-shrink:0}
.tn-brand{display:flex;align-items:center;gap:10px}
.tn-logo{width:34px;height:34px;background:var(--p);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff}
.tn-title{font-size:14px;font-weight:600;color:var(--txt)}
.tn-title span{font-weight:400;color:var(--muted);font-size:12px;margin-left:4px}
.tn-tabs{display:flex;gap:2px;align-items:center}
.tn-tab{padding:5px 12px;border-radius:var(--radius-md);font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:all .15s;font-family:inherit;white-space:nowrap}
.tn-tab:hover{background:var(--bg);color:var(--txt)}
.tn-tab.active{background:var(--p);color:#fff}
.tn-right{display:flex;align-items:center;gap:8px}
.tn-user{display:flex;align-items:center;gap:7px;padding:5px 10px 5px 6px;border:1px solid var(--border);border-radius:var(--radius-md);background:var(--bg);font-size:12px}
.tn-avatar{width:26px;height:26px;border-radius:50%;background:var(--p);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.tn-uname{font-weight:500;color:var(--txt)}
.tn-urole{font-size:10px;color:var(--muted)}
.btn-logout{padding:5px 12px;border:1px solid var(--border);border-radius:var(--radius-md);background:var(--card);color:var(--muted);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-logout:hover{background:var(--rbg);color:var(--rtxt);border-color:#fecaca}

/* ── PAGE ─────────────────── */
.page-wrap{flex:1;max-width:1140px;width:100%;margin:0 auto;padding:20px}
.page-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;gap:10px;flex-wrap:wrap}
.page-hdr-l h2{font-size:19px;font-weight:700}
.page-hdr-l p{font-size:12px;color:var(--muted);margin-top:2px}
.page-hdr-r{display:flex;gap:7px;align-items:center;flex-wrap:wrap}

/* ── STATS ─────────────────── */
.stats-4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.stats-3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;box-shadow:var(--shadow-sm)}
.stat-label{font-size:11px;font-weight:500;color:var(--muted);margin-bottom:5px}
.stat-value{font-size:26px;font-weight:700;line-height:1}
.stat-sub{font-size:11px;color:var(--muted);margin-top:4px}
.sc-green .stat-value{color:var(--green)}.sc-amber .stat-value{color:var(--amber)}
.sc-blue .stat-value{color:var(--blue)}.sc-red .stat-value{color:var(--red)}
.sc-purple .stat-value{color:var(--purple)}

/* ── CARDS & GRIDS ─────────────────── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm)}
.card-body{padding:18px 20px}
.card-title{font-size:13px;font-weight:600;margin-bottom:14px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px}
.g14{display:grid;grid-template-columns:1.3fr 1fr;gap:14px;margin-bottom:14px}

/* ── BUTTONS ─────────────────── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--radius-md);font-size:13px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:all .15s;font-family:inherit;white-space:nowrap}
.btn-primary{background:var(--p);color:#fff;border-color:var(--p)}.btn-primary:hover{background:var(--p6)}
.btn-secondary{background:var(--card);color:var(--txt);border-color:var(--border)}.btn-secondary:hover{background:var(--bg)}
.btn-danger{background:var(--rbg);color:var(--rtxt);border-color:#fecaca}
.btn-success{background:var(--gbg);color:var(--gtxt);border-color:#86efac}
.btn-warning{background:var(--abg);color:var(--atxt);border-color:#fcd34d}
.btn-sm{padding:4px 10px;font-size:12px}.btn-xs{padding:3px 8px;font-size:11px}

/* ── BADGES ─────────────────── */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.bg-green{background:var(--gbg);color:var(--gtxt)}.bg-amber{background:var(--abg);color:var(--atxt)}
.bg-red{background:var(--rbg);color:var(--rtxt)}.bg-blue{background:var(--bbg);color:var(--btxt)}
.bg-gray{background:#f1f5f9;color:#475569}.bg-purple{background:var(--pbg);color:var(--ptxt)}
.bg-primary{background:var(--p5);color:var(--p)}

/* ── TABLE ─────────────────── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{text-align:left;padding:9px 13px;font-size:11px;font-weight:600;color:var(--muted);border-bottom:1px solid var(--border);background:var(--bg);text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
tbody td{padding:10px 13px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--bg)}
.td-name{font-weight:600}.td-muted{color:var(--muted);font-size:12px}

/* ── ACTION BAR ─────────────────── */
.action-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border)}
.action-bar-title{font-size:13px;font-weight:600}

/* ── FORM ─────────────────── */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:12px;font-weight:500;color:var(--muted)}
.form-group input,.form-group select,.form-group textarea{padding:8px 11px;border:1px solid var(--border);border-radius:var(--radius-md);font-size:13px;color:var(--txt);background:var(--card);outline:none;font-family:inherit;width:100%;transition:border-color .15s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(4,49,50,.08)}
.form-group textarea{resize:vertical;min-height:75px}
.form-group input[readonly]{background:var(--bg)}

/* ── MODAL ─────────────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.4);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;z-index:1000}
.modal-overlay.open{display:flex}
.modal-box{background:var(--card);border-radius:var(--radius-lg);border:1px solid var(--border);box-shadow:0 20px 60px rgba(0,0,0,.15);width:440px;max-width:calc(100vw - 24px);max-height:90vh;overflow-y:auto}
.modal-hdr{padding:16px 20px 0;display:flex;align-items:center;justify-content:space-between}
.modal-hdr h3{font-size:15px;font-weight:700}
.modal-x{width:26px;height:26px;border-radius:50%;background:var(--bg);border:1px solid var(--border);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:var(--muted);line-height:1}
.modal-x:hover{background:var(--rbg);color:var(--rtxt);border-color:#fecaca}
.modal-body{padding:14px 20px;display:flex;flex-direction:column;gap:11px}
.modal-footer{padding:0 20px 18px;display:flex;gap:7px;justify-content:flex-end}

/* ── PROGRESS ─────────────────── */
.prog-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.prog-lbl{font-size:12px;color:var(--muted);width:70px;flex-shrink:0}
.prog-bar{flex:1;height:6px;background:var(--bg);border-radius:3px;overflow:hidden;border:1px solid var(--border)}
.prog-fill{height:100%;border-radius:3px;background:var(--p);transition:width .5s ease}
.prog-pct{font-size:12px;font-weight:600;min-width:32px;text-align:right}

/* ── NOTICE ─────────────────── */
.notice{padding:11px 14px;border-radius:var(--radius-md);background:var(--p5);border:1px solid var(--p1);color:var(--p);font-size:12px;line-height:1.6}
.notice-warn{background:var(--abg);border-color:#fcd34d;color:var(--atxt)}
.notice-danger{background:var(--rbg);border-color:#fecaca;color:var(--rtxt)}

/* ── YATAK GRID ─────────────────── */
.bed-grid-wrap{margin-bottom:16px}
.floor-tabs{display:flex;gap:3px;padding:3px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-md);width:fit-content;margin-bottom:14px;flex-wrap:wrap}
.floor-tab{padding:5px 12px;border-radius:var(--radius);border:none;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;background:transparent;color:var(--muted);transition:all .15s}
.floor-tab:hover{background:var(--card);color:var(--txt)}
.floor-tab.active{background:var(--p);color:#fff;box-shadow:var(--shadow-sm)}
.room-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-md);padding:12px;margin-bottom:10px}
.room-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.room-no{font-size:13px;font-weight:700}
.room-type{font-size:11px;color:var(--muted)}
.bed-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:6px}
.bed-item{border:1.5px solid;border-radius:var(--radius-md);padding:8px 6px;text-align:center;font-size:11px;font-weight:600;cursor:pointer;transition:all .12s;position:relative}
.bed-item:hover{transform:scale(1.04);box-shadow:var(--shadow)}
.bed-item.empty{background:#fff;border-color:var(--border);color:var(--muted)}
.bed-item.occupied{background:var(--rbg);border-color:#fca5a5;color:var(--rtxt)}
.bed-item.reserved{background:var(--abg);border-color:#fcd34d;color:var(--atxt)}
.bed-item.maintenance{background:var(--bbg);border-color:#93c5fd;color:var(--btxt)}
.bed-no{font-size:10px;font-weight:700;display:block}
.bed-name{font-size:9px;opacity:.8;display:block;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
.leg-dot{width:10px;height:10px;border-radius:2px;border:1px solid transparent}

/* ── BAŞVURU AKIŞ ─────────────────── */
.app-flow{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.flow-step{flex:1;min-width:140px;padding:12px 14px;border-radius:var(--radius-md);border:1px solid var(--border);background:var(--card);text-align:center;position:relative}
.flow-step::after{content:'→';position:absolute;right:-12px;top:50%;transform:translateY(-50%);color:var(--light);font-size:16px;z-index:1}
.flow-step:last-child::after{display:none}
.flow-icon{font-size:20px;margin-bottom:4px;display:block}
.flow-title{font-size:12px;font-weight:600}
.flow-sub{font-size:10px;color:var(--muted);margin-top:2px}
.flow-step.done{border-color:var(--green);background:var(--gbg)}
.flow-step.active-step{border-color:var(--p);background:var(--p5)}

/* ── FİNANS ─────────────────── */
.fin-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px}
.fin-row:last-child{border-bottom:none}
.fin-name{font-weight:600}
.fin-meta{font-size:11px;color:var(--muted);margin-top:2px}
.fin-amount{font-weight:700;font-size:14px}
.fin-amount.debt{color:var(--red)}
.fin-amount.paid{color:var(--green)}
.fin-amount.partial{color:var(--amber)}

/* ── CHART BAR ─────────────────── */
.chart-bars{display:flex;align-items:flex-end;gap:6px;height:80px;padding-top:8px}
.chart-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.chart-bar{width:100%;border-radius:3px 3px 0 0;background:var(--p);transition:height .4s ease;min-height:4px}
.chart-bar-lbl{font-size:9px;color:var(--muted);white-space:nowrap}
.chart-bar-val{font-size:9px;font-weight:600;color:var(--txt)}

/* ── SMS/WA ─────────────────── */
.msg-template{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-md);padding:12px 14px;margin-bottom:8px}
.msg-template-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.msg-template-name{font-size:13px;font-weight:600}
.msg-template-body{font-size:12px;color:var(--muted);line-height:1.6;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:8px 10px}

/* ── HERO ─────────────────── */
.hero-card{background:var(--p);color:#fff;border-radius:var(--radius-lg);padding:18px 20px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.hero-card h3{font-size:17px;font-weight:700}
.hero-card p{font-size:12px;opacity:.65;margin-top:3px}
.hero-badge{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);border-radius:var(--radius-md);padding:7px 14px;font-size:12px}

/* ── INFO TABLE ─────────────────── */
.info-tbl{width:100%;border-collapse:collapse}
.info-tbl td{padding:9px 0;border-bottom:1px solid var(--border);font-size:13px}
.info-tbl tr:last-child td{border-bottom:none}
.info-tbl .ik{color:var(--muted);font-size:12px;width:45%}
.info-tbl .iv{font-weight:600}

/* ── ARIZA ─────────────────── */
.ariza-item{display:flex;gap:12px;align-items:flex-start;padding:12px 16px;border-bottom:1px solid var(--border)}
.ariza-item:last-child{border-bottom:none}
.ariza-icon{width:34px;height:34px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px}
.ai-urgent{background:var(--rbg)}.ai-normal{background:var(--abg)}.ai-done{background:var(--gbg)}
.ariza-title{font-size:13px;font-weight:600}
.ariza-meta{font-size:11px;color:var(--muted);margin-top:2px}
.ariza-badges{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap}

/* ── DUYURU ─────────────────── */
.duyuru-item{border-left:3px solid var(--p);padding:10px 14px;background:var(--p5);border-radius:0 var(--radius-md) var(--radius-md) 0;margin-bottom:8px}
.duyuru-title{font-size:13px;font-weight:600}
.duyuru-date{font-size:11px;color:var(--muted);margin-top:2px}
.duyuru-body{font-size:12px;color:var(--muted);margin-top:6px;line-height:1.6}

/* ── EMPTY ─────────────────── */
.empty-state{text-align:center;padding:40px 24px;color:var(--muted);font-size:13px}
.empty-icon{font-size:32px;margin-bottom:10px;opacity:.4}

/* ── MINI CHART ─────────────────── */
.donut{position:relative;width:80px;height:80px;flex-shrink:0}
.donut svg{transform:rotate(-90deg)}
.donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:16px;font-weight:700}
.donut-sub{font-size:9px;color:var(--muted);font-weight:400}

/* ── BAŞVURU ÖĞRENCİ ─────────────────── */
.apply-card{max-width:560px;margin:0 auto}
.apply-steps{display:flex;gap:0;margin-bottom:24px}
.apply-step{flex:1;text-align:center;position:relative}
.apply-step::after{content:'';position:absolute;top:14px;right:-50%;width:100%;height:2px;background:var(--border)}
.apply-step:last-child::after{display:none}
.apply-step-num{width:28px;height:28px;border-radius:50%;background:var(--bg);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;margin:0 auto 5px;position:relative;z-index:1}
.apply-step.done .apply-step-num{background:var(--p);border-color:var(--p);color:#fff}
.apply-step.curr .apply-step-num{background:#fff;border-color:var(--p);color:var(--p)}
.apply-step-lbl{font-size:10px;color:var(--muted);font-weight:500}
.apply-step.done .apply-step-lbl{color:var(--p)}
</style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div id="loginScreen" class="screen active">
  <div class="login-box">
    <div class="login-top">
      <div class="login-logo">KY</div>
      <h1>Korkmazlar Yurt Yönetim Sistemi</h1>
      <p>Rol bazlı erişim · v3.0</p>
    </div>
    <div class="login-body">
      <div class="login-section-label">Kullanıcı Rolü</div>
      <div class="role-grid" id="roleGrid"></div>
      <div class="form-field">
        <label>Kullanıcı Adı</label>
        <input type="text" id="loginUser" placeholder="Kullanıcı adı">
      </div>
      <div class="form-field">
        <label>Şifre</label>
        <input type="password" id="loginPass" placeholder="Şifre">
      </div>

function buildLoginUI(){
  const roleGrid=document.getElementById('roleGrid');

    </div>`).join('');
  updateDemoHint('mudur');
}
function setRole(k){
  loginRoleKey=k;
  document.querySelectorAll('.role-card').forEach(c=>c.classList.toggle('active',c.dataset.role===k));
  updateDemoHint(k);
}
function updateDemoHint(k){
  const r=ROLES[k];
  document.getElementById('loginDemo').innerHTML=`Demo: <b>${k}</b> / <b>${r.pass}</b>`;
}
function doLogin(){
  const u=document.getElementById('loginUser').value.trim();
  const p=document.getElementById('loginPass').value.trim();
  const r=ROLES[loginRoleKey];
  if(u!==loginRoleKey||p!==r.pass){alert('Kullanıcı adı veya şifre hatalı!');return;}
  currentRole=loginRoleKey;
  document.getElementById('navRoleLabel').textContent='— '+r.label;
  document.getElementById('navAv').textContent=r.initials;
  document.getElementById('navName').textContent=r.name;
  document.getElementById('navRole').textContent={mudur:'Tam Yetki',operasyon:'Operasyon',muhasebe:'Muhasebe',ogrenci:'Öğrenci'}[currentRole];
  buildNav(r.nav);
  document.getElementById('loginScreen').classList.remove('active');
  document.getElementById('mainApp').classList.add('active');
  navigate(r.nav[0]);
}
function doLogout(){
  currentRole=null;
  document.getElementById('mainApp').classList.remove('active');
  document.getElementById('loginScreen').classList.add('active');
  document.getElementById('loginUser').value='';
  document.getElementById('loginPass').value='';
}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.getElementById('loginScreen').classList.contains('active'))doLogin();});

let activeKatIdx=0;
function odalar(b){
  setHeader('Oda & Yatak Planı','Yatak bazlı doluluk yönetimi',
    `<button class="btn btn-primary" onclick="openTopluGuncelle()">✏️ Toplu Güncelle</button>`);
  renderOdalar(b);
}
function renderOdalar(b){
  let totYatak=0,dolYatak=0,bosYatak=0,bakYatak=0,rezYatak=0;
  TUM_ODALAR.forEach(o=>BEDS[o].forEach(bed=>{
    totYatak++;
    if(bed.durum==='occupied')dolYatak++;
    else if(bed.durum==='empty')bosYatak++;
    else if(bed.durum==='maintenance')bakYatak++;
    else if(bed.durum==='reserved')rezYatak++;
  }));
  const kat=KATS[activeKatIdx];
  b.innerHTML=`
  <div class="stats-4">
    <div class="stat-card"><div class="stat-label">Toplam Yatak</div><div class="stat-value" style="color:var(--txt)">${totYatak}</div></div>
    <div class="stat-card sc-red"><div class="stat-label">Dolu</div><div class="stat-value">${dolYatak}</div></div>
    <div class="stat-card sc-green"><div class="stat-label">Boş</div><div class="stat-value">${bosYatak}</div></div>
    <div class="stat-card sc-amber"><div class="stat-label">Rezerve</div><div class="stat-value">${rezYatak}</div></div>
  </div>
  <div class="card" style="margin-bottom:14px">
    <div class="card-body">
      <div class="floor-tabs">
        ${KATS.map((k,i)=>`<button class="floor-tab ${i===activeKatIdx?'active':''}" onclick="switchKat(${i})">${k.ad}</button>`).join('')}
      </div>
      <div class="legend">
        <div class="leg-item"><div class="leg-dot" style="background:#fff;border-color:var(--border)"></div>Boş</div>
        <div class="leg-item"><div class="leg-dot" style="background:var(--rbg);border-color:#fca5a5"></div>Dolu</div>
        <div class="leg-item"><div class="leg-dot" style="background:var(--abg);border-color:#fcd34d"></div>Rezerve</div>
        <div class="leg-item"><div class="leg-dot" style="background:var(--bbg);border-color:#93c5fd"></div>Bakım</div>
      </div>
      <div id="katOdalar">${renderKatOdalar(kat)}</div>
    </div>
  </div>`;
}
function renderKatOdalar(kat){
  return kat.odalar.map(oda=>{
    const beds=BEDS[oda];
    const kap=odaKapasite(oda);
    const dolBed=beds.filter(b=>b.durum==='occupied').length;
    return `
    <div class="room-card">
      <div class="room-header">
        <div><span class="room-no">Oda ${oda}</span> <span class="room-type">${kap} Kişilik</span></div>
        <span class="badge ${dolBed===0?'bg-gray':dolBed===kap?'bg-red':'bg-amber'}">${dolBed}/${kap} dolu</span>
      </div>
      <div class="bed-list">
        ${beds.map(bed=>{
          const ogr=bed.ogrenci_id?ogrenciler.find(o=>o.id===bed.ogrenci_id):null;
          return `<div class="bed-item ${bed.durum}" onclick="openBedDetay('${oda}',${bed.no})">
            <span class="bed-no">Yatak ${bed.no}</span>
            <span class="bed-name">${ogr?ogr.ad:bed.durum==='empty'?'Boş':bed.durum==='reserved'?'Rezerve':'Bakım'}</span>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}
function switchKat(idx){
  activeKatIdx=idx;
  document.querySelectorAll('.floor-tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  document.getElementById('katOdalar').innerHTML=renderKatOdalar(KATS[idx]);
}
function openBedDetay(oda,bedNo){
  const bed=BEDS[oda].find(b=>b.no===bedNo);
  const ogr=bed.ogrenci_id?ogrenciler.find(o=>o.id===bed.ogrenci_id):null;
  openModal(`
    <div class="modal-hdr"><h3>🛏️ Oda ${oda} — Yatak ${bedNo}</h3><button class="modal-x" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="form-group"><label>Durum</label>
        <select class="form-control" id="bedDurum">
          <option value="empty" ${bed.durum==='empty'?'selected':''}>Boş</option>
          <option value="occupied" ${bed.durum==='occupied'?'selected':''}>Dolu</option>
          <option value="reserved" ${bed.durum==='reserved'?'selected':''}>Rezerve</option>
          <option value="maintenance" ${bed.durum==='maintenance'?'selected':''}>Bakım</option>
        </select>
      </div>
      <div class="form-group"><label>Öğrenci (Dolu ise)</label>
        <select class="form-control" id="bedOgr">
          <option value="">— Seçiniz —</option>
          ${ogrenciler.map(o=>`<option value="${o.id}" ${bed.ogrenci_id===o.id?'selected':''}>${o.ad}</option>`).join('')}
        </select>
      </div>
      <div class="form-group"><label>Not</label><input class="form-control" placeholder="İsteğe bağlı not..."></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">İptal</button>
      <button class="btn btn-primary" onclick="saveBed('${oda}',${bedNo})">Kaydet</button>
    </div>`);
}
function saveBed(oda,bedNo){
  const bed=BEDS[oda].find(b=>b.no===bedNo);
  bed.durum=document.getElementById('bedDurum').value;
  const ogrId=parseInt(document.getElementById('bedOgr').value);
  bed.ogrenci_id=ogrId||null;
  closeModal();
  renderOdalar(document.getElementById('pageBody'));
}
function openTopluGuncelle(){
  openModal(`
    <div class="modal-hdr"><h3>✏️ Toplu Oda Güncelle</h3><button class="modal-x" onclick="closeModal()">✕</button></div>

      </div>
      <div class="form-group"><label>Yatak No</label>
        <select class="form-control" id="tg_bed"><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option></select>
      </div>
      <div class="form-group"><label>Durum</label>
        <select class="form-control" id="tg_durum">
          <option value="empty">Boş</option><option value="occupied">Dolu</option>
          <option value="reserved">Rezerve</option><option value="maintenance">Bakım</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">İptal</button>
      <button class="btn btn-primary" onclick="saveToplu()">Güncelle</button>
    </div>`);
}
function saveToplu(){
  const oda=document.getElementById('tg_oda').value;
  const no=parseInt(document.getElementById('tg_bed').value);
  const d=document.getElementById('tg_durum').value;
  const bed=BEDS[oda]?.find(b=>b.no===no);
  if(bed){bed.durum=d;if(d!=='occupied')bed.ogrenci_id=null;}
  closeModal(); renderOdalar(document.getElementById('pageBody'));

    </div>`);
}
function yatakTahsisEt(id){
  const bv=basvurular.find(x=>x.id===id);
  const val=document.getElementById('yt_yatak').value.split('|');
  const oda=val[0]; const bedNo=parseInt(val[1]);
  const bed=BEDS[oda].find(b=>b.no===bedNo);
  if(bed){bed.durum='occupied';}
  bv.mesaj=`Oda ${oda} Yatak ${bedNo} tahsis edildi.`; bv.adim=4;
  // Öğrenciye oda bilgisi ekle
  const ogr=ogrenciler.find(o=>o.ad===bv.ad);
  if(ogr){ogr.oda=oda;ogr.yatak=bedNo;if(bed)bed.ogrenci_id=ogr.id;}
  closeModal();
  alert(`✅ ${bv.ad} için Oda ${oda} Yatak ${bedNo} tahsis edildi!\n📱 SMS/WA bildirimi gönderildi.`);
  pgBasvurular(document.getElementById('pageBody'));
}

  const topAlacak=finansKayitlar.filter(f=>f.durum!=='Ödendi').reduce((s,f)=>s+(f.tutar-f.odenen),0);
  const topBorc=finansKayitlar.reduce((s,f)=>s+f.tutar,0);

  b.innerHTML=`
  <div class="stats-4">
    <div class="stat-card sc-green"><div class="stat-label">Toplam Tahsilat</div><div class="stat-value">${(topTahsilat/1000).toFixed(1)}K ₺</div><div class="stat-sub">${finansKayitlar.filter(f=>f.durum==='Ödendi').length} kayıt</div></div>

    <div class="stat-card sc-blue"><div class="stat-label">Tahsil Oranı</div><div class="stat-value">${Math.round(topTahsilat/topBorç*100)}%</div></div>
  </div>

  <!-- Öğrenci bazlı borç -->
  <div class="card" style="margin-bottom:14px">
    <div class="action-bar"><div class="action-bar-title">👩 Öğrenci Bazlı Borç Durumu</div></div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>Öğrenci</th><th>Oda</th><th>Toplam Borç</th><th>Ödenen</th><th>Kalan</th><th>Durum</th><th>İşlem</th></tr></thead>
      <tbody>
      ${ogrenciler.filter(o=>o.durum==='Aktif').map(ogr=>{
        const ogrFin=finansKayitlar.filter(f=>f.ogrId===ogr.id);
        const topBorOgr=ogrFin.reduce((s,f)=>s+f.tutar,0);
        const topOde=ogrFin.reduce((s,f)=>s+f.odenen,0);
        const kalan=topBorOgr-topOde;
        const sDurum=kalan===0?'Temiz':kalan===topBorOgr?'Borçlu':'Kısmi';
        return `<tr>
          <td class="td-name">${ogr.ad}</td>
          <td>${ogr.oda?`<span class="badge bg-primary">${ogr.oda}</span>`:'—'}</td>
          <td>${topBorOgr.toLocaleString('tr')} ₺</td>
          <td style="color:var(--green);font-weight:600">${topOde.toLocaleString('tr')} ₺</td>
          <td class="fin-amount ${kalan>0?kalan<topBorOgr?'partial':'debt':'paid'}">${kalan.toLocaleString('tr')} ₺</td>
          <td><span class="badge ${sDurum==='Temiz'?'bg-green':sDurum==='Borçlu'?'bg-red':'bg-amber'}">${sDurum}</span></td>
          <td style="display:flex;gap:4px">
            <button class="btn btn-secondary btn-xs" onclick="openOgrDetaiFin(${ogr.id})">📊 Detay</button>
            ${kalan>0?`<button class="btn btn-warning btn-xs" onclick="openHatirlatma(${ogr.id})">📱 Hatırlat</button>`:''}
          </td>
        </tr>`;
      }).join('')}

    </table></div>
  </div>

    <div class="action-bar"><div class="action-bar-title">💳 Ödeme Kayıtları</div></div>

        <td class="${f.odenen===f.tutar?'fin-amount paid':f.odenen>0?'fin-amount partial':''}">${f.odenen.toLocaleString('tr')} ₺</td>

        <td><span class="badge ${f.durum==='Ödendi'?'bg-green':f.durum==='Kısmi'?'bg-amber':'bg-red'}">${f.durum}</span></td>
      </tr>`).join('')}
      </tbody>
    </table></div>
  </div>`;
}

function saveOdeme(){
  const ogrId=parseInt(document.getElementById('oe_ogr').value);
  const ogr=ogrenciler.find(o=>o.id===ogrId);
  const tutar=parseInt(document.getElementById('oe_tutar').value)||0;
  const odenen=parseInt(document.getElementById('oe_odenen').value)||0;
  finansKayitlar.push({id:Date.now(),ogrId,ogrAd:ogr.ad,ay:document.getElementById('oe_ay').value,tutar,odenen,tarih:document.getElementById('oe_tarih').value,durum:odenen>=tutar?'Ödendi':odenen>0?'Kısmi':'Bekliyor'});
  topBorç=finansKayitlar.reduce((s,f)=>s+f.tutar,0);
  closeModal();pgFinans(document.getElementById('pageBody'));
}
function openHatirlatma(ogrId){
  const ogr=ogrenciler.find(o=>o.id===ogrId);
  const ogrFin=finansKayitlar.filter(f=>f.ogrId===ogrId&&f.durum!=='Ödendi');
  const topKalan=ogrFin.reduce((s,f)=>s+(f.tutar-f.odenen),0);
  openModal(`
    <div class="modal-hdr"><h3>📱 Ödeme Hatırlatması</h3><button class="modal-x" onclick="closeModal()">✕</button></div>
    <div class="modal-body">

        <b>Alıcı:</b> ${ogr.ad}<br>
        <b>Telefon:</b> ${ogr.tel}<br>
        <b>Kalan Borç:</b> ${topKalan.toLocaleString('tr')} ₺

      <div class="form-group" style="margin-top:12px"><label>Mesaj Şablonu</label>
        <textarea class="form-control" style="height:80px">Sayın ${ogr.ad}, ${topKalan.toLocaleString('tr')} ₺ tutarındaki yurt aidatınız henüz ödenmemiştir. Lütfen en kısa sürede ödeme yapınız. Korkmazlar Yurt Yönetimi</textarea>

      <button class="btn btn-secondary" onclick="closeModal()">İptal</button>
      <button class="btn btn-warning" onclick="alert('📱 SMS gönderildi!\\n💬 WhatsApp mesajı gönderildi!');closeModal()">📱 Gönder</button>

}

// BAŞVURU YAP (öğrenci)
let basvuruAdim=1;
function basvuruYap(b){
  setHeader('Başvuru Yap','Yurt başvurunuzu doldurun');
  b.innerHTML=`
  <div class="apply-card">
    <div class="apply-steps">
      <div class="apply-step ${basvuruAdim>=1?'done':''}"><div class="apply-step-num">${basvuruAdim>1?'✓':'1'}</div><div class="apply-step-lbl">Kişisel Bilgi</div></div>
      <div class="apply-step ${basvuruAdim>=2?'done':basvuruAdim===2?'curr':''}"><div class="apply-step-num">${basvuruAdim>2?'✓':'2'}</div><div class="apply-step-lbl">Oda Tercihi</div></div>
      <div class="apply-step ${basvuruAdim>=3?'done':''}"><div class="apply-step-num">3</div><div class="apply-step-lbl">Gönder</div></div>
    </div>

    ${basvuruAdim===1?`
    <div class="card card-body">
      <div class="card-title">📝 Adım 1: Kişisel Bilgiler</div>
      <div class="form-row" style="margin-bottom:11px">
        <div class="form-group"><label>Ad Soyad</label><input class="form-control" id="bv_ad" placeholder="Adınız Soyadınız"></div>
        <div class="form-group"><label>TC Kimlik No</label><input class="form-control" id="bv_tc" placeholder="11 haneli TC"></div>
      </div>
      <div class="form-row" style="margin-bottom:11px">
        <div class="form-group"><label>Telefon</label><input class="form-control" id="bv_tel" placeholder="05xx xxx xx xx"></div>
        <div class="form-group"><label>E-posta</label><input class="form-control" id="bv_mail" placeholder="@mail.com"></div>
      </div>
      <div class="form-group" style="margin-bottom:0"><label>Okul / Bölüm</label><input class="form-control" id="bv_okul" placeholder="Üniversite ve bölüm bilgisi"></div>
    </div>
    <div style="display:flex;justify-content:flex-end;margin-top:10px">
      <button class="btn btn-primary" onclick="basvuruIleri()">İleri →</button>
    </div>`

    :basvuruAdim===2?`
    <div class="card card-body">
      <div class="card-title">🛏️ Adım 2: Oda Tercihi</div>
      <div class="form-group" style="margin-bottom:11px"><label>Oda Tipi Tercihi</label>
        <select class="form-control" id="bv_tip">
          <option>1 Kişilik (12 oda)</option>
          <option>2 Kişilik (6 oda)</option>
          <option>3 Kişilik (18 oda)</option>
          <option>4 Kişilik (24 oda)</option>
        </select>
      </div>
      <div class="form-group" style="margin-bottom:11px"><label>Dönem</label>
        <select class="form-control">
          <option>2025-2026 Güz Dönemi</option>
          <option>2025-2026 Bahar Dönemi</option>
          <option>2025-2026 Yıllık</option>
        </select>
      </div>
      <div class="form-group" style="margin-bottom:0"><label>Özel Talep (isteğe bağlı)</label>
        <textarea class="form-control" id="bv_not" placeholder="Özel talep veya notunuz varsa yazınız..."></textarea>
      </div>
    </div>
    <div style="display:flex;justify-content:space-between;margin-top:10px">
      <button class="btn btn-secondary" onclick="basvuruAdim=1;basvuruYap(document.getElementById('pageBody'))">← Geri</button>
      <button class="btn btn-primary" onclick="basvuruGonder()">Başvuruyu Gönder 🚀</button>
    </div>`

    :`
    <div class="card card-body" style="text-align:center;padding:40px">
      <div style="font-size:48px;margin-bottom:16px">✅</div>
      <h3 style="font-size:18px;margin-bottom:8px">Başvurunuz Alındı!</h3>
      <p style="color:var(--muted);font-size:13px;margin-bottom:16px">Başvurunuz incelenmektedir. Sonuç SMS ve WhatsApp üzerinden bildirilecektir.</p>
      <div class="notice">Başvuru No: <b>#${Date.now().toString().slice(-6)}</b></div>
      <button class="btn btn-secondary" style="margin-top:14px" onclick="basvuruAdim=1;navigate('ogrenciHome')">Ana Sayfaya Dön</button>
    </div>`}`;
}
function basvuruIleri(){
  const ad=document.getElementById('bv_ad')?.value.trim();
  if(!ad){alert('Ad Soyad gerekli!');return;}
  basvuruAdim=2;basvuruYap(document.getElementById('pageBody'));
}
function basvuruGonder(){
  const tip=document.getElementById('bv_tip')?.value.split(' ')[0]+' Kişilik';
  basvurular.unshift({id:Date.now(),ad:'(Öğrenci)',tc:'',tel:'',email:'',tip,tarih:new Date().toISOString().split('T')[0],durum:'Bekliyor',not:'',adim:1,mesaj:''});
  basvuruAdim=3;basvuruYap(document.getElementById('pageBody'));
}

function arizaBildir(b){
  setHeader('Arıza Bildir','Oda arızanızı bildirin');
  b.innerHTML=`
  <div class="g2">
    <div class="card card-body">
      <div class="card-title">🔧 Yeni Arıza Bildirimi</div>
      <div style="display:flex;flex-direction:column;gap:11px">
        <div class="form-group"><label>Oda No</label><input class="form-control" value="101" readonly></div>
        <div class="form-group"><label>Yatak No</label><input class="form-control" value="1" readonly></div>
        <div class="form-group"><label>Öncelik</label>
          <select class="form-control" id="ar_onc"><option>Düşük</option><option>Orta</option><option>Yüksek</option></select>
        </div>
        <div class="form-group"><label>Konu</label><input class="form-control" id="ar_konu" placeholder="Kısa başlık"></div>
        <div class="form-group"><label>Açıklama</label><textarea class="form-control" id="ar_acik" placeholder="Detaylı açıklayın..."></textarea></div>
        <button class="btn btn-primary" onclick="kaydetAriza()">Arıza Bildir</button>
      </div>
    </div>
    <div class="card">
      <div class="action-bar"><div class="action-bar-title">📋 Bildirimlerim</div></div>
      ${arizalar.filter(a=>a.oda==='101').map(a=>`
      <div class="ariza-item">
        <div class="ariza-icon ${a.durum==='Tamamlandı'?'ai-done':'ai-normal'}">🔧</div>
        <div style="flex:1"><div class="ariza-title">${a.konu}</div><div class="ariza-meta">${a.tarih} · ${a.aciklama}</div></div>
        <span class="badge ${a.durum==='Tamamlandı'?'bg-green':a.durum==='İşlemde'?'bg-blue':'bg-amber'}">${a.durum}</span>
      </div>`).join('')||'<div class="empty-state" style="padding:20px"><div class="empty-icon">🔧</div>Bildirim yok.</div>'}
    </div>
  </div>`;
}
function kaydetAriza(){
  const k=document.getElementById('ar_konu').value.trim();
  if(!k){alert('Konu gerekli!');return;}
  arizalar.unshift({id:Date.now(),oda:'101',yatak:1,konu:k,aciklama:document.getElementById('ar_acik').value,tarih:new Date().toISOString().split('T')[0],durum:'Bekliyor',oncelik:document.getElementById('ar_onc').value});
  alert('Arıza bildiriminiz alındı!');arizaBildir(document.getElementById('pageBody'));
}
